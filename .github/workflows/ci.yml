name: Build XPI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-xpi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-xpi:
    name: Build Zotero plugin XPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build XPI
        run: npm run build

      - name: Upload XPI
        uses: actions/upload-artifact@v4
        with:
          name: llm-for-zotero-xpi-${{ github.sha }}
          path: .scaffold/build/*.xpi
          if-no-files-found: error
          retention-days: 30
